<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Time - مولّد المشروع</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0D1F16;
    color: #F5F0E8;
    font-family: 'Segoe UI', Tahoma, sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .card {
    background: #1A2F22;
    border: 1px solid rgba(212,175,55,0.3);
    border-radius: 20px;
    padding: 30px 24px;
    max-width: 400px;
    width: 100%;
    text-align: center;
  }
  .icon { font-size: 60px; margin-bottom: 16px; }
  h1 { color: #D4AF37; font-size: 24px; margin-bottom: 8px; }
  p { color: #B8A99A; font-size: 14px; line-height: 1.6; margin-bottom: 24px; }
  .btn {
    background: linear-gradient(135deg, #1B4332, #2D6A4F);
    color: #D4AF37;
    border: 1px solid rgba(212,175,55,0.4);
    border-radius: 14px;
    padding: 16px 24px;
    font-size: 16px;
    font-weight: bold;
    cursor: pointer;
    width: 100%;
    margin-bottom: 12px;
    transition: opacity 0.2s;
  }
  .btn:hover { opacity: 0.9; }
  .btn:disabled { opacity: 0.5; cursor: not-allowed; }
  .progress {
    display: none;
    background: #0D2B1A;
    border-radius: 10px;
    height: 8px;
    margin: 16px 0;
    overflow: hidden;
  }
  .progress-bar {
    height: 100%;
    background: #D4AF37;
    border-radius: 10px;
    transition: width 0.3s;
    width: 0%;
  }
  .status { color: #D4AF37; font-size: 13px; min-height: 20px; }
  .files-list {
    text-align: right;
    margin-top: 16px;
    font-size: 12px;
    color: #B8A99A;
    line-height: 1.8;
  }
</style>
</head>
<body>
<div class="card">
  <div class="icon">⏳</div>
  <h1>The Time</h1>
  <p>اضغط الزر لتحميل المشروع كاملاً كملف ZIP جاهز للرفع على GitHub</p>
  <button class="btn" id="btn" onclick="generate()">⬇️ تحميل المشروع كاملاً</button>
  <div class="progress" id="progress"><div class="progress-bar" id="bar"></div></div>
  <div class="status" id="status"></div>
  <div class="files-list" id="list"></div>
</div>

'lib/screens/prayer_screen.dart': `import 'package:flutter/material.dart';
import 'package:geolocator/geolocator.dart';
import 'package:http/http.dart' as http;
import 'package:google_fonts/google_fonts.dart';
import 'package:flutter_animate/flutter_animate.dart';
import 'dart:convert';
import '../core/theme.dart';

class PrayerScreen extends StatefulWidget {
  const PrayerScreen({super.key});
  @override State<PrayerScreen> createState() => _PrayerScreenState();
}

class _PrayerScreenState extends State<PrayerScreen> {
  Map<String,String> _prayers = {}; bool _loading = true; String _city = ''; String _date = '';
  final _info = [
    {'key':'Fajr','name':'الفجر','icon':Icons.wb_twilight},
    {'key':'Sunrise','name':'الشروق','icon':Icons.wb_sunny_outlined},
    {'key':'Dhuhr','name':'الظهر','icon':Icons.wb_sunny},
    {'key':'Asr','name':'العصر','icon':Icons.cloud_queue},
    {'key':'Maghrib','name':'المغرب','icon':Icons.nights_stay_outlined},
    {'key':'Isha','name':'العشاء','icon':Icons.nightlight_round},
  ];

  @override void initState() { super.initState(); _load(); }

  Future<void> _load() async {
    try {
      var perm = await Geolocator.requestPermission();
      if (perm == LocationPermission.denied) { _byIp(); return; }
      var pos = await Geolocator.getCurrentPosition();
      await _fetch(pos.latitude, pos.longitude);
    } catch (_) { _byIp(); }
  }

  Future<void> _byIp() async {
    try {
      final r = await http.get(Uri.parse('http://ip-api.com/json'));
      final d = json.decode(r.body);
      await _fetch(d['lat'], d['lon'], city: d['city']);
    } catch (_) { setState(() => _loading = false); }
  }

  Future<void> _fetch(double lat, double lon, {String? city}) async {
    final n = DateTime.now();
    final r = await http.get(Uri.parse('https://api.aladhan.com/v1/timings/\${n.day}-\${n.month}-\${n.year}?latitude=\$lat&longitude=\$lon&method=4'));
    final d = json.decode(r.body);
    setState(() {
      _prayers = (d['data']['timings'] as Map<String,dynamic>).map((k,v) => MapEntry(k, v.toString()));
      _city = city ?? ''; _date = d['data']['date']['readable']; _loading = false;
    });
  }

  @override
  Widget build(BuildContext context) => Scaffold(
    appBar: AppBar(title: const Text('أوقات الصلاة')),
    body: _loading ? const Center(child: CircularProgressIndicator(color: AppTheme.gold))
      : ListView(padding: const EdgeInsets.all(16), children: [
        Container(padding: const EdgeInsets.all(20),
          decoration: BoxDecoration(gradient: const LinearGradient(colors: [AppTheme.primary, AppTheme.secondary]),
            borderRadius: BorderRadius.circular(20), border: Border.all(color: AppTheme.gold.withOpacity(0.4))),
          child: Column(children: [
            Text(_date, style: GoogleFonts.cairo(color: AppTheme.goldLight, fontSize: 16)),
            if (_city.isNotEmpty) Text('📍 \$_city', style: GoogleFonts.cairo(color: AppTheme.textSecondary, fontSize: 13)),
          ])).animate().fadeIn(),
        const SizedBox(height: 16),
        ..._info.asMap().entries.map((e) => Container(
          margin: const EdgeInsets.only(bottom: 10),
          padding: const EdgeInsets.symmetric(horizontal: 20, vertical: 16),
          decoration: BoxDecoration(color: AppTheme.surface, borderRadius: BorderRadius.circular(16),
            border: Border.all(color: AppTheme.gold.withOpacity(0.2))),
          child: Row(children: [
            Icon(e.value['icon'] as IconData, color: AppTheme.gold, size: 26),
            const SizedBox(width: 14),
            Text(e.value['name'] as String, style: GoogleFonts.cairo(color: AppTheme.textPrimary, fontSize: 17, fontWeight: FontWeight.w600)),
            const Spacer(),
            Text(_prayers[e.value['key']] ?? '--:--', style: GoogleFonts.cairo(color: AppTheme.goldLight, fontSize: 20, fontWeight: FontWeight.bold)),
          ]),
        ).animate().fadeIn(delay: Duration(milliseconds: e.key * 80))),
      ]),
  );
}
`,

'lib/screens/settings_screen.dart': `import 'package:flutter/material.dart';
import 'package:google_fonts/google_fonts.dart';
import 'package:flutter_animate/flutter_animate.dart';
import 'package:shared_preferences/shared_preferences.dart';
import 'package:url_launcher/url_launcher.dart';
import '../core/theme.dart';

class SettingsScreen extends StatefulWidget {
  const SettingsScreen({super.key});
  @override State<SettingsScreen> createState() => _SettingsScreenState();
}

class _SettingsScreenState extends State<SettingsScreen> {
  final _ctrl = TextEditingController();
  bool _obscure = true, _saved = false, _loading = false;
  String _status = '';

  @override void initState() { super.initState(); _load(); }

  Future<void> _load() async {
    final p = await SharedPreferences.getInstance();
    final k = p.getString('anthropic_api_key') ?? '';
    setState(() { _ctrl.text = k; _saved = k.isNotEmpty; _status = k.isNotEmpty ? 'مفتاح محفوظ ✓' : ''; });
  }

  Future<void> _save() async {
    final k = _ctrl.text.trim();
    if (k.isEmpty) return;
    setState(() => _loading = true);
    if (!k.startsWith('sk-ant-')) {
      setState(() { _loading = false; _status = '❌ المفتاح غير صحيح'; _saved = false; });
      return;
    }
    final p = await SharedPreferences.getInstance();
    await p.setString('anthropic_api_key', k);
    setState(() { _loading = false; _saved = true; _status = '✅ تم الحفظ بنجاح'; });
  }

  Future<void> _delete() async {
    final p = await SharedPreferences.getInstance();
    await p.remove('anthropic_api_key');
    setState(() { _ctrl.clear(); _saved = false; _status = 'تم الحذف'; });
  }

  @override
  Widget build(BuildContext context) => Scaffold(
    appBar: AppBar(title: const Text('الإعدادات')),
    body: SingleChildScrollView(padding: const EdgeInsets.all(20), child: Column(crossAxisAlignment: CrossAxisAlignment.end, children: [
      Container(width: double.infinity, padding: const EdgeInsets.all(18),
        decoration: BoxDecoration(gradient: const LinearGradient(colors: [AppTheme.primary, AppTheme.secondary]),
          borderRadius: BorderRadius.circular(20), border: Border.all(color: AppTheme.gold.withOpacity(0.3))),
        child: Column(crossAxisAlignment: CrossAxisAlignment.end, children: [

class _UrlChecker extends StatefulWidget { const _UrlChecker(); @override State<_UrlChecker> createState() => _UrlCheckerState(); }
class _UrlCheckerState extends State<_UrlChecker> {
  final _ctrl = TextEditingController(); String? _result; bool _loading = false; bool? _safe;
  Future<void> _check() async {
    final url = _ctrl.text.trim(); if (url.isEmpty) return;
    setState(() { _loading = true; _result = null; });
    await Future.delayed(const Duration(seconds: 1));
    final isSafe = !url.contains('malware') && !url.contains('phishing') && url.startsWith('http');
    setState(() { _safe = isSafe; _result = isSafe ? '✅ الرابط يبدو آمناً' : '⚠️ تحذير: رابط مشبوه!'; _loading = false; });
  }
  @override Widget build(BuildContext context) => Padding(padding: const EdgeInsets.all(20), child: Column(children: [
    const SizedBox(height: 20),
    TextField(controller: _ctrl, style: GoogleFonts.cairo(color: AppTheme.textPrimary),
      decoration: InputDecoration(hintText: 'أدخل الرابط هنا...', hintStyle: GoogleFonts.cairo(color: AppTheme.textSecondary),
        prefixIcon: const Icon(Icons.link, color: AppTheme.gold), filled: true, fillColor: AppTheme.surface,
        border: OutlineInputBorder(borderRadius: BorderRadius.circular(16)), enabledBorder: OutlineInputBorder(borderRadius: BorderRadius.circular(16), borderSide: BorderSide(color: AppTheme.gold.withOpacity(0.2))),
        focusedBorder: OutlineInputBorder(borderRadius: BorderRadius.circular(16), borderSide: const BorderSide(color: AppTheme.gold)))),
    const SizedBox(height: 16),
    GestureDetector(onTap: _loading ? null : _check, child: Container(width: double.infinity, padding: const EdgeInsets.symmetric(vertical: 14),
      decoration: BoxDecoration(gradient: const LinearGradient(colors: [AppTheme.primary, AppTheme.secondary]), borderRadius: BorderRadius.circular(16), border: Border.all(color: AppTheme.gold.withOpacity(0.4))),
      child: Center(child: _loading ? const SizedBox(height: 20, width: 20, child: CircularProgressIndicator(color: AppTheme.gold, strokeWidth: 2))
        : Text('فحص الرابط', style: GoogleFonts.cairo(color: AppTheme.gold, fontWeight: FontWeight.bold, fontSize: 16))))),
    if (_result != null) Container(margin: const EdgeInsets.only(top: 20), padding: const EdgeInsets.all(16),
      decoration: BoxDecoration(color: _safe == true ? AppTheme.primary.withOpacity(0.5) : Colors.red.withOpacity(0.2), borderRadius: BorderRadius.circular(16),
        border: Border.all(color: _safe == true ? AppTheme.gold : Colors.red)),
      child: Text(_result!, textAlign: TextAlign.center, style: GoogleFonts.cairo(color: _safe == true ? AppTheme.goldLight : Colors.redAccent, fontSize: 16, fontWeight: FontWeight.bold))),
  ]));
}

      child: MobileScanner(onDetect: (c) { setState(() { _scanned = c.barcodes.first.rawValue; _scanning = false; }); })))

        child: Column(mainAxisAlignment: MainAxisAlignment.center, children: [

  ]));

class _FileChecker extends StatefulWidget { const _FileChecker(); @override State<_FileChecker> createState() => _FileCheckerState(); }
class _FileCheckerState extends State<_FileChecker> {
  String? _name; String? _result; bool _loading = false;
  Future<void> _pick() async {
    final r = await FilePicker.platform.pickFiles(); if (r == null) return;
    setState(() { _name = r.files.first.name; _loading = true; _result = null; });
    await Future.delayed(const Duration(seconds: 2));

class QuizScreen extends StatefulWidget {
  const QuizScreen({super.key});

}
class _QuizScreenState extends State<QuizScreen> {
  List<Map<String,dynamic>> _qs = []; int _cur = 0; int? _sel; int _score = 0;
  bool _done = false, _answered = false, _loading = false;
  String _err = '', _apiKey = '', _cat = 'الأمن السيبراني';
  final _cats = ['الأمن السيبراني','الشبكات','مختلط'];

  @override void initState() { super.initState(); _loadKey(); }
  Future<void> _loadKey() async { final p = await SharedPreferences.getInstance(); setState(() => _apiKey = p.getString('anthropic_api_key') ?? ''); }

  Future<void> _generate() async {
    if (_apiKey.isEmpty) return;
    setState(() { _loading = true; _err = ''; _qs = []; });
    final prompt = 'أنت خبير في \$_cat. أنشئ 10 أسئلة اختيار متعددة متنوعة وجديدة تماماً. أجب فقط بـ JSON بدون نص إضافي: [{"question":"...","options":["أ","ب","ج","د"],"correct":0,"explanation":"..."}]';
    try {
      final r = await http.post(Uri.parse('https://api.anthropic.com/v1/messages'),
        headers: {'Content-Type':'application/json','x-api-key':_apiKey,'anthropic-version':'2023-06-01'},
        body: json.encode({'model':'claude-sonnet-4-20250514','max_tokens':2000,'messages':[{'role':'user','content':prompt}]}));
      if (r.statusCode == 200) {
        final d = json.decode(r.body); final t = (d['content'][0]['text'] as String).replaceAll(RegExp(r'\`\`\`json|\`\`\`'),'').trim();
        setState(() { _qs = List<Map<String,dynamic>>.from(json.decode(t)); _cur=0; _score=0; _done=false; _answered=false; _sel=null; _loading=false; });
      } else { setState(() { _err = r.statusCode == 401 ? 'المفتاح غير صحيح' : 'حدث خطأ، حاول مجدداً'; _loading=false; }); }
    } catch(_) { setState(() { _err='تحقق من اتصالك'; _loading=false; }); }
  }

  void _answer(int i) { if (_answered) return; setState(() { _sel=i; _answered=true; if (i==_qs[_cur]['correct']) _score++; }); }
  void _next() { if (_cur < _qs.length-1) setState(() { _cur++; _sel=null; _answered=false; }) ; else setState(() => _done=true); }

    if (_apiKey.isEmpty) return _noKey();
    if (_loading) return _loadingView();

  Widget _errView() => Scaffold(appBar: AppBar(title: const Text('الاختبار الذكي')), body: Center(child: Padding(padding: const EdgeInsets.all(24), child: Column(mainAxisAlignment: MainAxisAlignment.center, children: [

  Widget _quizView() {
    final q = _qs[_cur]; final opts = List<String>.from(q['options']);
    return Scaffold(appBar: AppBar(title: const Text('الاختبار الذكي'),
      actions: [Padding(padding: const EdgeInsets.symmetric(horizontal: 16), child: Center(child: Text('\${_cur+1}/\${_qs.length}', style: GoogleFonts.cairo(color: AppTheme.gold, fontSize: 16))))]),
      body: Padding(padding: const EdgeInsets.all(20), child: Column(children: [
        LinearProgressIndicator(value: (_cur+1)/_qs.length, backgroundColor: AppTheme.surface, valueColor: const AlwaysStoppedAnimation(AppTheme.gold), borderRadius: BorderRadius.circular(10), minHeight: 8),
        const SizedBox(height: 20),
        Container(width: double.infinity, padding: const EdgeInsets.all(20), decoration: BoxDecoration(color: AppTheme.surface, borderRadius: BorderRadius.circular(20), border: Border.all(color: AppTheme.gold.withOpacity(0.3))),
          child: Text(q['question'] as String, textAlign: TextAlign.right, style: GoogleFonts.cairo(color: AppTheme.textPrimary, fontSize: 17, height: 1.6, fontWeight: FontWeight.w600))).animate().fadeIn().slideY(begin: -0.1),
        const SizedBox(height: 16),
        ...opts.asMap().entries.map((e) { final i=e.key; Color bc=AppTheme.gold.withOpacity(0.2),bg=AppTheme.surface,tc=AppTheme.textPrimary;
